<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1a3a5c">
  <title>بنك أسئلة الثقافة المالية | حسين علقم</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header>
    <div class="hdr-icon">📚</div>
    <h1>بنك أسئلة الثقافة المالية</h1>
    <p>إعداد المشرف التربوي: <strong>حسين علقم</strong></p>
  </header>

  <!-- NAVBAR (hidden on start) -->
  <div id="navbar" style="display:none">
    <button id="btn-back" onclick="goBack()" style="display:none">→ رجوع</button>
    <span id="nav-title" class="nb-title"></span>
    <span class="nb-space"></span>
    <button id="qnav-btn" class="nb-qnav" onclick="toggleQNav()" style="display:none">
      <i class="fas fa-th"></i> خريطة
    </button>
    <button id="btn-editor" class="nb-editor" onclick="toggleEditorMode()">
      <i class="fas fa-lock"></i> <span id="btn-editor-text">وضع المحرر</span>
    </button>
    <button id="btn-home" onclick="goHome()" style="display:none">🏠 الرئيسية</button>
  </div>

  <!-- PAGE: START -->
  <div id="pg-start" class="pg">
    <div class="welcome">
      <div class="w-icon">🎓</div>
      <div class="w-title">مرحباً بك في منصة الاختبارات الذكية</div>
      <div class="w-sub">اختر نمط الاختبار للبدء</div>
    </div>
    <div class="mode-row">
      <button class="mbtn active" id="btn-train" onclick="setMode('train')">
        <span class="mb-icon">📖</span>
        <span class="mb-name">تدريبي</span>
        <span class="mb-desc">الإجابة تظهر فوراً</span>
      </button>
      <button class="mbtn" id="btn-exam" onclick="setMode('exam')">
        <span class="mb-icon">📝</span>
        <span class="mb-name">امتحاني</span>
        <span class="mb-desc">النتيجة في النهاية</span>
      </button>
    </div>
    <button class="btn-enter" onclick="startApp()">ابدأ الآن ←</button>
  </div>

  <!-- PAGE: HOME -->
  <div id="pg-home" class="pg" style="display:none">
    <div id="home-inner"></div>
  </div>

  <!-- PAGE: LESSONS -->
  <div id="pg-lessons" class="pg" style="display:none">
    <div id="lessons-inner"></div>
  </div>

  <!-- PAGE: UNITS -->
  <div id="pg-units" class="pg" style="display:none">
    <div id="units-inner"></div>
  </div>

  <!-- PAGE: MINISTERIAL -->
  <div id="pg-ministerial" class="pg" style="display:none">
    <div id="ministerial-inner"></div>
  </div>

  <!-- PAGE: EXAMS -->
  <div id="pg-exams" class="pg" style="display:none">
    <div id="exams-inner"></div>
  </div>

  <!-- PAGE: QUIZ -->
  <div id="pg-quiz" class="pg" style="display:none">
    <div id="quiz-inner"></div>
  </div>

  <!-- PAGE: RESULT -->
  <div id="pg-result" class="pg" style="display:none">
    <div id="result-inner"></div>
  </div>

</div>

<!-- QUESTION NAVIGATION OVERLAY -->
<div id="qnav-overlay" class="qnav-overlay">
  <div class="qnav-panel">
    <div class="qnav-head">
      <span class="qnav-title">خريطة الأسئلة</span>
      <button class="qnav-close" onclick="toggleQNav()"><i class="fas fa-times"></i></button>
    </div>
    <div class="qnav-legend">
      <span class="lg lg-c"></span> صحيحة
      <span class="lg lg-w"></span> خاطئة
      <span class="lg lg-s"></span> لم تُجب
    </div>
    <div id="qnav-grid" class="qnav-grid"></div>
  </div>
</div>

<!-- EDITOR: PASSWORD MODAL -->
<div id="editor-pwd-overlay" class="editor-overlay">
  <div class="editor-modal editor-pwd-modal">
    <div class="editor-modal-head">
      <span class="editor-modal-title"><i class="fas fa-shield-alt"></i> وضع المحرر</span>
      <button class="editor-modal-close" onclick="closeEditorPwd()"><i class="fas fa-times"></i></button>
    </div>
    <div class="editor-modal-body">
      <p class="editor-hint">أدخل كلمة المرور لتفعيل وضع تحرير الأسئلة:</p>
      <input type="password" id="editor-pwd-input" class="editor-input" placeholder="كلمة المرور" autocomplete="off">
      <p id="editor-pwd-err" class="editor-err" style="display:none">كلمة المرور غير صحيحة</p>
      <button class="editor-btn-primary" onclick="submitEditorPwd()">🔐 تفعيل</button>
    </div>
  </div>
</div>

<!-- EDITOR: QUESTION EDIT MODAL -->
<div id="editor-edit-overlay" class="editor-overlay">
  <div class="editor-modal editor-edit-modal">
    <div class="editor-modal-head">
      <span class="editor-modal-title"><i class="fas fa-edit"></i> تحرير السؤال</span>
      <button class="editor-modal-close" onclick="closeEditorEdit()"><i class="fas fa-times"></i></button>
    </div>
    <div class="editor-modal-body" id="editor-edit-body">
      <!-- يتم ملؤها ديناميكياً من script.js -->
    </div>
  </div>
</div>

<!-- TOAST CONTAINER -->
<div id="toast-box" class="toast-box"></div>

<script src="questions.js"></script>
<script src="script.js"></script>
<script>
  // تطبيق الأسئلة المُضافة محفوظة محلياً قبل أي شيء آخر
  applyLocalAdditions();
  // تطبيق أي تعديلات محفوظة محلياً قبل عرض الصفحة
  applyLocalOverrides();
  // استعادة حالة وضع المحرر إذا كان مفعّلاً سابقاً على هذا الجهاز
  if (localStorage.getItem('qbank_editor_active') === '1'){
    editorMode = true;
    document.body.classList.add('editor-on');
  }
  // Show start page on load
  showPage('start');
  // تحديث واجهة زر المحرر بعد تحميل الصفحة
  setTimeout(function(){ updateEditorBtnUI(); }, 50);
</script>
</body>
</html>
